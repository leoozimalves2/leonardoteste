document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

8-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Mulish';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"f8788b1a-c5ca-4b14-9419-2296336bd2bc\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Mulish';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"510e4111-8325-404d-bbc1-3dc0373fb50a\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box;margin:0;padding:0}\n  body{margin:0}\n  @keyframes crmFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}\n  @keyframes crmPulse{0%{box-shadow:0 0 0 0 rgba(37,211,102,.45)}70%{box-shadow:0 0 0 16px rgba(37,211,102,0)}100%{box-shadow:0 0 0 0 rgba(37,211,102,0)}}\n  @keyframes crmDrift{0%{background-position:0 0}100%{background-position:560px 280px}}\n  ::selection{background:rgba(224,180,113,.3)}\n  [data-reveal]{opacity:1 !important;transform:none !important;transition:none !important}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div ref=\"{{ setRoot }}\" id=\"topo\" style=\"background:#061d1a;color:#e9f1ec;font-family:'Mulish',sans-serif;min-height:100vh;overflow-x:hidden;position:relative\">\n\n  <!-- URGENCY BAR -->\n  <sc-if value=\"{{ showBar }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"background:#a3ccb6;color:#08221d;display:flex;align-items:center;justify-content:center;gap:18px;padding:11px 20px;flex-wrap:wrap;font-weight:700;font-size:14px;letter-spacing:.01em\">\n    <span>🚀 Turmas Revalida 2026 com inscrições abertas — vagas limitadas por turma.<\u002Fspan>\n    <button onclick=\"{{ goCta }}\" style=\"background:#08221d;color:#e9f1ec;border:none;border-radius:7px;padding:9px 18px;font-family:inherit;font-weight:800;font-size:12.5px;letter-spacing:.06em;cursor:pointer\">GARANTIR MINHA VAGA<\u002Fbutton>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- NAV -->\n  <nav style=\"position:sticky;top:0;z-index:50;background:rgba(6,29,26,.82);backdrop-filter:blur(14px);border-bottom:1px solid rgba(163,204,182,.12)\">\n    <div style=\"max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 28px;gap:24px\">\n      <div style=\"display:flex;align-items:center;gap:12px;cursor:pointer\" onclick=\"{{ goTopo }}\">\n        <div style=\"width:40px;height:40px;border-radius:50%;border:1.5px solid rgba(224,180,113,.55);display:flex;align-items:center;justify-content:center;background:rgba(163,204,182,.08)\">\n          <span style=\"font-family:'Cormorant Garamond',serif;font-weight:700;font-size:17px;color:#e0b471\">CRM<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"line-height:1.05\">\n          <div style=\"font-family:'Cormorant Garamond',serif;font-weight:700;font-size:18px;color:#e9f1ec\">CRM na Mão<\u002Fdiv>\n          <div style=\"font-size:9.5px;letter-spacing:.22em;color:rgba(163,204,182,.8);font-weight:600\">REVALIDA · 2ª FASE<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:30px\">\n        <a onclick=\"{{ goTopo }}\" style=\"font-size:14.5px;font-weight:600;color:#e0b471;cursor:pointer\">Início<\u002Fa>\n        <a onclick=\"{{ goPlanos }}\" style=\"font-size:14.5px;font-weight:500;color:rgba(233,241,236,.82);cursor:pointer\">Planos<\u002Fa>\n        <a onclick=\"{{ goEquipe }}\" style=\"font-size:14.5px;font-weight:500;color:rgba(233,241,236,.82);cursor:pointer\">Equipe<\u002Fa>\n        <a onclick=\"{{ goDepo }}\" style=\"font-size:14.5px;font-weight:500;color:rgba(233,241,236,.82);cursor:pointer\">Depoimentos<\u002Fa>\n      <\u002Fdiv>\n      <button onclick=\"{{ goCta }}\" style=\"display:flex;align-items:center;gap:9px;background:transparent;border:1.5px solid #25D366;color:#e9f1ec;border-radius:30px;padding:10px 18px;font-family:inherit;font-weight:700;font-size:13px;letter-spacing:.04em;cursor:pointer\">\n        <span style=\"width:20px;height:20px;border-radius:50%;background:#25D366;display:inline-flex;align-items:center;justify-content:center;color:#08221d;font-size:12px;font-weight:900\">✆<\u002Fspan>\n        FALAR NO WHATSAPP\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- HERO -->\n  <section data-screen-label=\"Hero\" style=\"position:relative;border-bottom:1px solid rgba(163,204,182,.1)\">\n    <div style=\"position:absolute;inset:0;background-image:radial-gradient(rgba(163,204,182,.10) 1px, transparent 1.4px);background-size:30px 30px;animation:crmDrift 30s linear infinite;opacity:.7\"><\u002Fdiv>\n    <div style=\"position:absolute;inset:0;background:radial-gradient(900px 500px at 78% 30%, rgba(20,70,60,.55), transparent 70%)\"><\u002Fdiv>\n    <div style=\"position:relative;max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1.05fr .95fr;gap:40px;align-items:center;padding:64px 28px 72px\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1)\">\n        <div style=\"display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(224,180,113,.4);border-radius:30px;padding:6px 14px;margin-bottom:26px\">\n          <span style=\"width:7px;height:7px;border-radius:50%;background:#e0b471;box-shadow:0 0 10px #e0b471\"><\u002Fspan>\n          <span style=\"font-size:11.5px;letter-spacing:.14em;color:#e0c79a;font-weight:700\">MENTORIA · REVALIDA INEP<\u002Fspan>\n        <\u002Fdiv>\n        <h1 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(52px,6.4vw,92px);line-height:.96;letter-spacing:-.01em;color:#f3f7f4\">\n          Seu <span style=\"color:#a3ccb6\">CRM<\u002Fspan><br>no Brasil<br>\n          <span style=\"font-family:'Dancing Script',cursive;font-weight:700;color:#e0b471;font-size:.74em;display:inline-block;margin-top:6px\">começa aqui.<\u002Fspan>\n        <\u002Fh1>\n        <p style=\"margin-top:26px;max-width:480px;font-size:17.5px;line-height:1.6;color:rgba(233,241,236,.8)\">\n          Mentoria com simulações reais da prova prática do Revalida, comentadas por médicos que já passaram pelo mesmo caminho — e sabem exatamente onde você <strong style=\"color:#e9f1ec\">ganha ou perde pontos.<\u002Fstrong>\n        <\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-top:34px\">\n          <button onclick=\"{{ goCta }}\" style=\"background:linear-gradient(180deg,#e0b471,#c89a52);color:#08221d;border:none;border-radius:11px;padding:17px 30px;font-family:inherit;font-weight:800;font-size:15px;letter-spacing:.06em;cursor:pointer;box-shadow:0 14px 34px -12px rgba(224,180,113,.6)\">QUERO MINHA APROVAÇÃO<\u002Fbutton>\n          <button onclick=\"{{ goPlanos }}\" style=\"background:transparent;color:#e9f1ec;border:1px solid rgba(163,204,182,.35);border-radius:11px;padding:17px 24px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer\">Ver os planos<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"margin-top:18px;font-size:13px;color:rgba(163,204,182,.85);font-weight:600\">Vagas limitadas por turma · Fale agora no WhatsApp<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"160\" style=\"opacity:0;transform:translateY(28px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1)\">\n        <div style=\"position:relative;animation:crmFloat 7s ease-in-out infinite\">\n          <div style=\"aspect-ratio:4/4.3;border:1px dashed rgba(163,204,182,.45);border-radius:20px;background:repeating-linear-gradient(135deg,rgba(163,204,182,.05) 0 14px,rgba(163,204,182,.10) 14px 28px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px\">\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.04em;color:rgba(233,241,236,.65)\">[ foto · 3 médicos mentores ]<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(233,241,236,.4)\">recorte transparente · ~880×940<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"position:absolute;left:-18px;bottom:34px;background:rgba(8,34,29,.92);border:1px solid rgba(224,180,113,.35);border-radius:14px;padding:14px 18px;backdrop-filter:blur(8px);box-shadow:0 20px 40px -18px rgba(0,0,0,.6)\">\n            <div style=\"font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;color:#e0b471\">6+<\u002Fdiv>\n            <div style=\"font-size:11.5px;color:rgba(233,241,236,.7);font-weight:600\">anos de turmas formadas<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- VALOR / ABERTURA -->\n  <section style=\"border-bottom:1px solid rgba(163,204,182,.08)\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .8s ease;max-width:880px;margin:0 auto;padding:78px 28px;text-align:center\">\n      <p style=\"font-family:'Cormorant Garamond',serif;font-size:clamp(26px,3.2vw,38px);line-height:1.32;font-weight:500;color:#f0f5f1\">\n        Você estudou anos pra ser médico. Mas a prova prática do Revalida não avalia só conhecimento — avalia <span style=\"color:#a3ccb6\">segurança, postura<\u002Fspan> e domínio do idioma na hora certa.\n      <\u002Fp>\n      <div style=\"width:48px;height:2px;background:#e0b471;margin:34px auto\"><\u002Fdiv>\n      <p style=\"font-size:17px;line-height:1.7;color:rgba(233,241,236,.74);max-width:680px;margin:0 auto\">\n        Muita gente foi reprovada não por falta de saber, mas por não saber como a banca avalia. A CRM na Mão foi criada por médicos que já revalidaram o próprio título — não é teoria de quem nunca fez a prova. É o caminho de quem já passou por ela e sabe onde a maioria perde pontos. <strong style=\"color:#e9f1ec\">Aqui você treina exatamente o que vão te cobrar no dia.<\u002Fstrong>\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- DOR -->\n  <section style=\"background:linear-gradient(180deg,#04140f,#061d1a)\">\n    <div style=\"max-width:1080px;margin:0 auto;padding:80px 28px\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(24px);transition:opacity .8s ease;max-width:640px;margin-bottom:44px\">\n        <div style=\"font-size:12px;letter-spacing:.18em;color:#e0b471;font-weight:700;margin-bottom:14px\">SE VOCÊ JÁ FORMOU NO EXTERIOR…<\u002Fdiv>\n        <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(34px,4.4vw,52px);line-height:1.04;color:#f3f7f4\">Provavelmente já sentiu isso.<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px\">\n        <sc-for list=\"{{ pains }}\" as=\"pain\" hint-placeholder-count=\"5\">\n          <div data-reveal=\"\" style=\"opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease;display:flex;gap:14px;align-items:flex-start;background:rgba(163,204,182,.04);border:1px solid rgba(163,204,182,.12);border-radius:14px;padding:20px 22px\">\n            <span style=\"flex:0 0 auto;width:9px;height:9px;border-radius:2px;background:#e0b471;transform:rotate(45deg);margin-top:7px\"><\u002Fspan>\n            <span style=\"font-size:15.5px;line-height:1.55;color:rgba(233,241,236,.86)\">{{ pain }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SOLUÇÃO -->\n  <section style=\"border-top:1px solid rgba(163,204,182,.08);border-bott t&quot;},&quot;showFloatingWhatsApp&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Layout&quot;}}\">\nclass Component extends DCLogic {\n  state = { view: undefined, pense: true, faqOpen: 0 };\n\n  _scroll(id) {\n    const el = document.getElementById(id);\n    if (el) {\n      const y = el.getBoundingClientRect().top + window.scrollY - 70;\n      window.scrollTo({ top: y, behavior: 'smooth' });\n    }\n  }\n\n  renderVals() {\n    const s = this.state;\n    const view = s.view ?? (this.props.defaultPricingView || 'grid');\n\n    const tab = (id, label) => ({\n      label,\n      set: () => this.setState({ view: id }),\n      bg: view === id ? 'linear-gradient(180deg,#e0b471,#c89a52)' : 'transparent',\n      fg: view === id ? '#1a1206' : 'rgba(233,241,236,.78)'\n    });\n\n    const faqsRaw = [\n      { q: 'Quanto tempo preciso dedicar por semana?', a: 'O suficiente pra acompanhar as simulações comentadas e os encontros semanais com mentor. Recomendamos consistência, não horas excessivas.' },\n      { q: 'Serve pra quem já tentou o Revalida antes e não passou?', a: 'Sim. Boa parte dos nossos alunos chega depois de uma tentativa anterior — o método foi pensado justamente pra fechar essa lacuna.' },\n      { q: 'Serve pra quem se formou fora há pouco tempo e nunca tentou a prova?', a: 'Sim. A mentoria prepara desde a base do formato da prova até a simulação prática completa.' },\n      { q: 'Como funciona o acesso ao conteúdo?', a: 'Acesso à plataforma com simulações, videoaulas e material teórico, mais encontros ao vivo com mentor conforme o plano escolhido.' },\n      { q: 'Tem suporte direto com mentor?', a: 'Sim. Nos planos Essencial e Premium você tem encontros semanais com mentor, e no Premium acesso a 5 mentores exclusivos via WhatsApp.' },\n      { q: 'Quais formas de pagamento?', a: 'Pix à vista ou parcelamento no cartão — fale com a equipe para conferir as condições atuais.' }\n    ];\n    const faqs = faqsRaw.map((f, i) => ({\n      q: f.q, a: f.a,\n      open: s.faqOpen === i,\n      rot: s.faqOpen === i ? 'rotate(135deg)' : 'rotate(0deg)',\n      toggle: () => this.setState({ faqOpen: s.faqOpen === i ? null : i })\n    }));\n\n    const compareRows = [\n      { label: 'Simulações reais comentadas (2020–2025.2)', on: [true, true, true, true] },\n      { label: 'Videoaulas de esqueletos por área médica', on: [true, true, true, true] },\n      { label: 'Material teórico completo', on: [true, true, true, true] },\n      { label: 'Encontros semanais com mentor', on: [true, true, true, true] },\n      { label: 'Encontros semanais com ator', on: [false, true, false, false] },\n      { label: '5 mentores exclusivos no WhatsApp', on: [false, false, true, true] },\n      { label: 'Plataforma Pense Revalida', on: [false, true, false, true] }\n    ].map((r) => ({ label: r.label, cells: r.on.map((b) => ({ on: b, off: !b })) }));\n\n    return {\n      setRoot: (el) => { this._root = el; },\n      showBar: this.props.showAnnouncementBar !== false,\n      showFloat: this.props.showFloatingWhatsApp !== false,\n\n      goTopo: () => this._scroll('topo'),\n      goPlanos: () => this._scroll('planos'),\n      goEquipe: () => this._scroll('depoimentos'),\n      goDepo: () => this._scroll('depoimentos'),\n      goCta: () => this._scroll('cta'),\n\n      pains: [\n        'O medo de travar na frente da banca, mesmo sabendo o conteúdo.',\n        'A insegurança de falar em português sob pressão, num momento que define sua carreira.',\n        'A sensação de estar treinando \"no escuro\", sem saber se está fazendo certo.',\n        'A ansiedade de pensar \"e se eu for reprovado de novo?\"',\n        'A frustração de estudar muito e não saber se é isso que a prova realmente cobra.'\n      ],\n\n      benefits: [\n        { n: '1', title: 'Simulações reais comentadas', desc: 'Você entra na prova sabendo o que esperar, sem ser pego de surpresa.' },\n        { n: '2', title: 'Videoaulas de esqueletos por área', desc: 'Você organiza o raciocínio clínico rápido, sem perder tempo pensando na estrutura.' },\n        { n: '3', title: 'Encontros com mentor', desc: 'Você tira dúvidas direto com quem já passou pelo mesmo processo, sem ficar sozinho.' },\n        { n: '4', title: 'Encontros com ator', desc: 'Você treina a comunicação e a postura que a banca avalia, não só o conteúdo técnico.' },\n        { n: '5', title: 'Material teórico completo', desc: 'Você revisa o que precisa sem garimpar conteúdo solto na internet.' },\n        { n: '6', title: 'Acesso à Plataforma Pense', desc: 'Você tem ainda mais simulados e conteúdo pra fechar as lacunas que sobrarem.' }\n      ],\n\n      testimonials: [\n        '[ depoimento 1 — medo da prova prática antes / aprovação depois ]',\n        '[ depoimento 2 — insegurança com o português / resultado na prova ]',\n        '[ depoimento 3 — já tinha sido reprovado antes / passou com a mentoria ]'\n      ],\n\n      objections: [\n        { q: 'Mas R$ 1.197 é caro…', a: 'O custo de tentar a prova \"no escuro\" e ser reprovado de novo é tempo, taxa de inscrição e mais um ano de espera. A mentoria existe pra te dar o caminho certo já na próxima tentativa.' },\n        { q: 'Não sei se vou conseguir acompanhar…', a: 'Você não estuda sozinho. Tem mentor, material organizado por área e simulação comentada passo a passo. O método já foi testado com centenas de candidatos antes de você.' },\n        { q: 'Já tentei antes e não passei…', a: 'Muitos dos nossos alunos já tinham tentado o Revalida. A diferença não foi estudar mais — foi estudar o que a banca realmente cobra, com quem já foi avaliado por ela.' }\n      ],\n\n      essPenseFeatures: ['Tudo do plano Essencial', 'Acesso completo à Plataforma Pense Revalida', 'Dois encontros semanais com ator'],\n      premPenseFeatures: ['Tudo do plano Premium', 'Acesso completo à Plataforma Pense Revalida'],\n      essFeatures: ['Simulações reais comentadas (2020–2025.2)', 'Videoaulas de esqueletos por área médica', 'Material teórico completo', 'Encontro grupal semanal com mentor (10 semanas)'],\n      premFeatures: ['Simulações reais comentadas (2020–2025.2)', 'Videoaulas de esqueletos por área médica', 'Material teórico completo', '2 a 3 encontros semanais com mentores (8 semanas)', '5 mentores exclusivos no grupo de WhatsApp'],\n\n      viewTabs: [tab('grid', 'Todos os planos'), tab('focus', 'Com / Sem Pense'), tab('compare', 'Comparar')],\n\n      isFocus: view === 'focus',\n      showCards: view !== 'compare',\n      showCompare: view === 'compare',\n      compareRows,\n\n      showEP: view === 'grid' || (view === 'focus' && s.pense),\n      showPP: view === 'grid' || (view === 'focus' && s.pense),\n      showE: view === 'grid' || (view === 'focus' && !s.pense),\n      showP: view === 'grid' || (view === 'focus' && !s.pense),\n\n      setComPense: () => this.setState({ pense: true }),\n      setSemPense: () => this.setState({ pense: false }),\n      comPenseBg: s.pense ? 'linear-gradient(180deg,#e0b471,#c89a52)' : 'transparent',\n      comPenseFg: s.pense ? '#1a1206' : 'rgba(233,241,236,.78)',\n      semPenseBg: !s.pense ? 'linear-gradient(180deg,#e0b471,#c89a52)' : 'transparent',\n      semPenseFg: !s.pense ? '#1a1206' : 'rgba(233,241,236,.78)',\n\n      faqs\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
